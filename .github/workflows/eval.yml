# Advisory eval gate.
#
# This repo is a solo, no-SLA personal tool (see README → "What this is NOT").
# This workflow does NOT change that — it exists so the "regression-gated quality"
# claim is *practiced, not just preached*: every push/PR re-runs the honesty eval
# against the frozen baseline and proves the demo still reproduces. It is advisory.
name: eval-gate (advisory)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so commit indexing is reproducible
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Cache the embedding model (avoids HuggingFace 429 rate-limits)
        id: hfcache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-multilingual-e5-small-v1
      - name: Install the three deps the README quickstart lists
        run: pip install -r requirements.txt
      # On a cache hit, go fully offline so HF isn't contacted at all (no HEAD -> no 429).
      # On a cache miss (first run), stay online to download + populate the cache.
      - name: Eval gate — auto-builds the index, compares Hit@K to the frozen baseline (±5pp)
        env:
          HF_HUB_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '0' }}
          TRANSFORMERS_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '0' }}
        run: bash hitgate/check.sh ci
      - name: Auto-rerank gate — production operating point (RAG_RERANK_AUTO_MARGIN=0.015, advisory)
        # Gates the calibrated auto-trigger path (ADR-0005). Baseline frozen at Hit@5=0.96.
        # If the reranker model isn't cached, sentence-transformers falls back to the fused
        # ranking (Hit@5≈0.98) — still within ±5pp of the 0.96 baseline, so CI stays green.
        env:
          HF_HUB_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '0' }}
          TRANSFORMERS_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '0' }}
          RAG_RERANK_AUTO: "on"
          EVAL_EXTRA_FLAGS: "--auto-rerank"
          RAG_EVAL_BASELINE: "hitgate/baseline.auto-rerank.json"
        run: bash hitgate/check.sh auto-rerank-ci
      - name: Determinism gate — same query must yield the same top-K ordering
        env:
          HF_HUB_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '0' }}
          TRANSFORMERS_OFFLINE: ${{ steps.hfcache.outputs.cache-hit == 'true' && '1' || '0' }}
        run: RAG_SOURCE_ROOTS="$PWD" python -m hitgate.test_determinism
      - name: Unit tests — tokenizer, rank modes, harness, adapter
        # Reuses the e5 model the eval gate already cached; tests duck-type LangChain so the
        # adapter suite needs no extra install.
        run: |
          pip install pytest
          python -m pytest tests/ -q
